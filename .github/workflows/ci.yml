name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "install.sh"
      - "uninstall.sh"
      - "website/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "install.sh"
      - "uninstall.sh"
      - "website/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ── Detect changed areas and release tag pushes ─────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      website: ${{ steps.filter.outputs.website }}
      release_tag: ${{ steps.flags.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            rust:
              - 'src/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'install.sh'
              - 'uninstall.sh'
              - '.github/workflows/ci.yml'
            website:
              - 'website/**'
              - '.github/workflows/ci.yml'

      - id: flags
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "release_tag=true" >> "$GITHUB_OUTPUT"
          else
            echo "release_tag=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Test ────────────────────────────────────────────────────
  test:
    name: Test
    needs: changes
    if: needs.changes.outputs.release_tag == 'true' || needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install OpenSSL
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: cargo test
        run: cargo test --all

      - name: cargo clippy
        run: cargo clippy -- -D warnings

      - name: cargo fmt
        run: cargo fmt -- --check

  # ── Build release binaries ──────────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    needs: [changes, test]
    if: needs.changes.outputs.release_tag == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-11-arm

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install OpenSSL (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir dist
          tar -czf dist/polyws-${{ matrix.target }}.tar.gz \
            -C target/${{ matrix.target }}/release polyws

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Compress-Archive `
            -Path "target\${{ matrix.target }}\release\polyws.exe" `
            -DestinationPath "dist\polyws-${{ matrix.target }}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: polyws-${{ matrix.target }}
          path: dist/

  # ── Publish GitHub Release ──────────────────────────────────
  release:
    name: Publish Release
    needs: [changes, build]
    if: needs.changes.outputs.release_tag == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body: |
            Cross-platform release binaries for polyws ${{ github.ref_name }}.

            | Platform | Architecture | Archive |
            |----------|-------------|---------|
            | Linux    | x86_64      | `polyws-x86_64-unknown-linux-gnu.tar.gz` |
            | Linux    | aarch64     | `polyws-aarch64-unknown-linux-gnu.tar.gz` |
            | macOS    | Apple Silicon | `polyws-aarch64-apple-darwin.tar.gz` |
            | Windows  | x86_64      | `polyws-x86_64-pc-windows-msvc.zip` |
            | Windows  | aarch64     | `polyws-aarch64-pc-windows-msvc.zip` |

            ## Install
            ```bash
            curl -fsSL https://raw.githubusercontent.com/cmdworks/polyws/main/install.sh | bash
            ```

  # ── Deploy website to GitHub Pages ─────────────────────────
  pages:
    name: Deploy Website
    needs: changes
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.website == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: cd website && npm ci

      - name: Build Vite site
        run: cd website && npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist
